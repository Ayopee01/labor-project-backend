          description: The only board status returned by this API. UI maps this value to a column.
          enum:
            - open_app
            - ready
            - assigned
            - working
            - break
          example: ready
    AdminWorkerStatusListResponse:
      type: object
      properties:
        summary:
          type: object
          properties:
            total:
              type: integer
            open_app:
              type: integer
            ready:
              type: integer
            assigned:
              type: integer
            working:
              type: integer
            break:
              type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminWorkerStatusResponse"
    AdminForceWorkerStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ready
            - waiting
            - offline
            - break
          example: waiting
        reason:
          type: string
          example: Worker contacted admin for status correction.
    AdminForceWorkerStatusResponse:
      allOf:
        - $ref: "#/components/schemas/AdminWorkerStatusResponse"
        - type: object
          properties:
            message:
              type: string
