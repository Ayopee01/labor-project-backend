components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    gateBasicAuth:
      type: http
      scheme: basic
      description: Gate Client Credentials. Username is client_id and password is client_secret.
  schemas:
    ErrorResponse:
      type: object
      required:
        - statusCode
        - code
        - message
      properties:
        statusCode:
          type: integer
          example: 401
        code:
          type: string
          example: INVALID_TOKEN
        message:
          type: string
          example: Invalid or expired token.
        shift:
          type: object
          nullable: true
          description: Present on OUTSIDE_WORK_SHIFT errors.
          properties:
            name:
              type: string
              example: Morning shift
            start_time:
              type: string
              example: "06:00"
            end_time:
              type: string
              example: "18:00"
        remaining_time:
          type: string
          nullable: true
          description: Human-readable remaining time until the next shift start. Present on OUTSIDE_WORK_SHIFT errors.
          example: 28 minutes
    Account:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: user01
        role:
          type: string
          enum:
            - admin
            - worker
          example: worker
        status:
          type: string
          enum:
            - active
            - inactive
          example: active
        full_name:
          type: string
          example: Worker Name
        position:
          type: string
          nullable: true
          example: null
        email:
          type: string
          nullable: true
          example: admin@simmummuang.local
        phone:
          type: string
          nullable: true
          example: 081-000-0001
        permission_level:
          type: string
          nullable: true
          enum:
            - owner
            - manager
            - supervisor
          example: null
        created_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
        updated_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
    ProfileCardShift:
      type: object
      nullable: true
      properties:
        name:
          type: string
          example: day
        start_time:
          type: string
          example: "06:00"
        end_time:
          type: string
          example: "18:00"
    AdminProfileCard:
      type: object
      properties:
        role:
          type: string
          example: admin
        full_name:
          type: string
          example: Admin Sinummuang
        position:
          type: string
          nullable: true
          example: Administrator
        employee_code:
          type: string
          example: ADM0001
        admin_code:
          type: string
          example: ADM0001
        status:
          type: string
          example: active
        email:
          type: string
          nullable: true
          example: admin@simmummuang.local
        phone:
          type: string
          nullable: true
          example: 081-000-0001
        permission_level:
          type: string
          nullable: true
          example: owner
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/AdminPermission"
        latest_active_at:
          type: string
          nullable: true
          format: date-time
          example: 2026-07-13T02:07:55.618Z
    WorkerProfileCard:
      type: object
      properties:
        role:
          type: string
          example: worker
        full_name:
          type: string
          example: Worker Name
        employee_code:
          type: string
          nullable: true
          example: MN000142
        worker_code:
          type: string
          nullable: true
          example: MN000142
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mn000142.jpg
        nationality:
          type: string
          nullable: true
          enum:
            - Myanmar
            - Cambodia
          example: Myanmar
        work_start_date:
          type: string
          nullable: true
          format: date
          example: 2024-07-15
        phone:
          type: string
          nullable: true
          example: 081-234-5678
        shift:
          $ref: "#/components/schemas/ProfileCardShift"
    AuthProfileCard:
      oneOf:
        - $ref: "#/components/schemas/AdminProfileCard"
        - $ref: "#/components/schemas/WorkerProfileCard"
    AdminMeResponse:
      type: object
      properties:
        role:
          type: string
          example: admin
        full_name:
          type: string
          example: System Admin
        employee_code:
          type: string
          example: ADM0001
        position:
          type: string
          nullable: true
          example: Administrator
        admin_code:
          type: string
          example: ADM0001
        status:
          type: string
          example: active
        email:
          type: string
          nullable: true
          example: admin@simmummuang.local
        phone:
          type: string
          nullable: true
          example: 081-000-0001
        permission_level:
          type: string
          nullable: true
          example: manager
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/AdminPermission"
        latest_active_at:
          type: string
          nullable: true
          format: date-time
          example: 2026-07-13T03:18:06.020Z
    WorkerMeResponse:
      type: object
      properties:
        role:
          type: string
          example: worker
        full_name:
          type: string
          example: Worker Name
        employee_code:
          type: string
          nullable: true
          example: MN000142
        worker_code:
          type: string
          nullable: true
          example: MN000142
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mn000142.jpg
        status:
          type: string
          description: Worker UI status. Internal queue values are mapped to open_app, ready, assigned, working, or break.
          enum:
            - open_app
            - ready
            - assigned
            - working
            - break
          example: ready
        nationality:
          type: string
          nullable: true
          enum:
            - Myanmar
            - Cambodia
          example: Myanmar
        work_start_date:
          type: string
          nullable: true
          format: date
          example: 2024-07-15
        phone:
          type: string
          nullable: true
          example: 081-234-5678
        shift:
          $ref: "#/components/schemas/ProfileCardShift"
    WorkerProfile:
      type: object
      properties:
        id:
          type: integer
          example: 10
        account_id:
          type: integer
          example: 1
        worker_code:
          type: string
          example: MN000142
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mno00142.jpg
        nationality:
          type: string
          enum:
            - Myanmar
            - Cambodia
          example: Myanmar
        work_start_date:
          type: string
          format: date
          example: 2024-07-15
        phone:
          type: string
          example: 081-234-5678
        shirt_type:
          type: string
          nullable: true
          enum:
            - Navy
            - Blue
            - Green
          example: Navy
        shirt_number:
          type: string
          nullable: true
          example: "12"
    WorkSchedule:
      type: object
      properties:
        id:
          type: integer
          example: 25
        account_id:
          type: integer
          example: 1
        shift_no:
          type: integer
          enum:
            - 1
            - 2
          description: Current shift order for the worker.
          example: 1
        work_date:
          type: string
          format: date
          example: 2026-07-01
        shift_start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "06:00"
        shift_end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "18:00"
        shift_name:
          type: string
          example: day
        is_current:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
        updated_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
    AuthenticatedAccount:
      oneOf:
        - $ref: "#/components/schemas/AdminMeResponse"
        - $ref: "#/components/schemas/WorkerMeResponse"
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: user01
        password:
          type: string
          format: password
          example: "123456"
        device_id:
          type: string
          description: Required for worker login. Omit for admin login.
          example: browser-device-id
        device_name:
          type: string
          description: Required when the account role is worker. Omit for admin login.
          example: Chrome on Windows
    ConfirmForceLoginRequest:
      type: object
      required:
        - login_challenge_token
        - device_id
        - device_name
      properties:
        login_challenge_token:
          type: string
          example: temporary-jwt-token
        device_id:
          type: string
          example: browser-device-id
        device_name:
          type: string
          example: Chrome on Windows
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: refresh-jwt-token
    ChangeOwnPasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
          format: password
          example: Admin@123456
        new_password:
          type: string
          format: password
          example: Admin@654321
    ChangeOwnPasswordResponse:
      type: object
      properties:
        message:
          type: string
          example: Password changed successfully.
    AuthSuccessResponse:
      type: object
      properties:
        access_token:
          type: string
          example: access-jwt-token
        refresh_token:
          type: string
          example: refresh-jwt-token
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
    RefreshSuccessResponse:
      type: object
      properties:
        access_token:
          type: string
          example: access-jwt-token
        refresh_token:
          type: string
          example: refresh-jwt-token
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
    LoginConflictResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            code:
              type: string
              example: ACTIVE_SESSION_EXISTS
            login_challenge_token:
              type: string
              example: temporary-jwt-token
            active_device:
              type: object
              properties:
                device_id:
                  type: string
                  example: old-browser-device-id
                device_name:
                  type: string
                  example: Safari on iPhone
                last_active_at:
                  type: string
                  format: date-time
                  example: 2026-07-01T09:00:00.000Z
    LogoutSuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: Logged out successfully.
    ActionMessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Action completed successfully.
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 125
        total_pages:
          type: integer
          example: 7
    WorkerProfileInput:
      type: object
      required:
        - nationality
        - work_start_date
      properties:
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mno00142.jpg
        nationality:
          type: string
          enum:
            - Myanmar
            - Cambodia
          example: Myanmar
        work_start_date:
          type: string
          format: date
          example: 2024-07-15
        shirt_type:
          type: string
          enum:
            - Navy
            - Blue
            - Green
          example: Navy
        shirt_number:
          type: string
          example: "12"
    UpdateWorkerProfileInput:
      type: object
      properties:
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mno00142-updated.jpg
        nationality:
          type: string
          enum:
            - Myanmar
            - Cambodia
          example: Myanmar
        work_start_date:
          type: string
          format: date
          example: 2024-07-15
        shirt_type:
          type: string
          enum:
            - Navy
            - Blue
            - Green
          example: Navy
        shirt_number:
          type: string
          example: "12"
    WorkScheduleInput:
      type: object
      required:
        - shift_start_time
        - shift_end_time
      properties:
        work_date:
          type: string
          format: date
          description: Optional legacy field. Shift availability is checked by shift_start_time and shift_end_time only.
          example: 2026-07-01
        shift_start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "06:00"
        shift_end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "18:00"
    CreateUserRequest:
      type: object
      required:
        - full_name
        - phone
        - nationality
        - shirt_type
        - shirt_number
        - work_start_date
      properties:
        username:
          type: string
          description: Optional. If omitted, backend uses worker_code generated from nationality + shirt_type + shirt_number, for example MN000004.
          example: MN000004
        img:
          type: string
          description: Optional image URL from the UI. Stored as image_url.
          example: https://example.com/uploads/workers/worker001.jpg
        full_name:
          type: string
          example: Worker One
        phone:
          type: string
          description: Saved to accounts.phone. The initial worker password is the hashed value of this phone.
          example: "0812345678"
        nationality:
          type: string
          enum:
            - Myanmar
            - Cambodia
          example: Myanmar
        shirt_type:
          type: string
          enum:
            - Navy
            - Blue
            - Green
          example: Navy
        shirt_number:
          type: string
          description: Unique. Used with nationality and shirt_type to generate worker_code and default username.
          example: "4"
        work_start_date:
          type: string
          format: date
          description: First working date for the worker profile.
          example: 2026-07-03
        status:
          type: string
          enum:
            - active
            - inactive
          default: active
          example: active
        work_schedule:
          description: Legacy single-shift input. Send either work_schedule or work_schedules.
          $ref: "#/components/schemas/WorkScheduleInput"
        work_schedules:
          type: array
          description: Preferred input for current worker shifts. Send 1-2 schedules. The backend assigns shift_no by array order.
          minItems: 1
          maxItems: 2
          items:
            $ref: "#/components/schemas/WorkScheduleInput"
    CreateUserMultipartRequest:
      type: object
      required:
        - full_name
        - phone
        - nationality
        - shirt_type
        - shirt_number
        - work_start_date
      properties:
        image:
          type: string
          format: binary
          description: "Optional worker profile image. Allowed types: jpg, png, webp. Max size: 5 MB."
        username:
          type: string
          description: Optional. If omitted, backend uses worker_code generated from nationality + shirt_type + shirt_number, for example MN000004.
          example: MN000004
        full_name:
          type: string
          example: Worker One
        phone:
          type: string
          description: Saved to accounts.phone. The initial worker password is the hashed value of this phone.
          example: "0812345678"
        nationality:
          type: string
          enum:
            - Myanmar
            - Cambodia
          example: Myanmar
        shirt_type:
          type: string
          enum:
            - Navy
            - Blue
            - Green
          example: Navy
        shirt_number:
          type: string
          description: Unique. Used with nationality and shirt_type to generate worker_code and default username.
          example: "4"
        work_start_date:
          type: string
          format: date
          description: First working date for the worker profile.
          example: 2026-07-03
        status:
          type: string
          enum:
            - active
            - inactive
          default: active
          example: active
        work_date:
          type: string
          format: date
          description: Optional legacy field. Shift availability is checked by shift_start_time and shift_end_time only.
          example: 2026-07-03
        shift_start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "08:00"
        shift_end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "17:00"
        work_schedule:
          type: string
          description: Legacy single-shift input. Send a JSON string with shift_start_time and shift_end_time. work_date is optional and kept only for backward compatibility.
          example: '{"shift_start_time":"08:00","shift_end_time":"17:00"}'
        work_schedules:
          type: string
          description: Preferred input for current worker shifts. Send a JSON string array with 1-2 schedules. The backend assigns shift_no by array order.
          example: '[{"shift_start_time":"08:00","shift_end_time":"12:00"},{"shift_start_time":"13:00","shift_end_time":"17:00"}]'
    UpdateUserRequest:
      type: object
      properties:
        worker_code:
          type: string
          description: Optional. If omitted and nationality, shirt_type, or shirt_number is sent, backend regenerates worker_code and username from nationality + shirt_type + shirt_number using existing profile values for fields omitted from the request.
          example: MN000115
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mn000115.jpg
        img:
          type: string
          nullable: true
          description: Optional alias for image_url.
          example: https://example.com/uploads/workers/mn000115.jpg
        full_name:
          type: string
          example: Worker Name
        phone:
          type: string
          example: "0811111111"
        nationality:
          type: string
          enum:
            - Myanmar
            - Cambodia
          example: Myanmar
        position:
          type: string
          nullable: true
          example: Worker
        shirt_type:
          type: string
          nullable: true
          enum:
            - Navy
            - Blue
            - Green
          example: Navy
        shirt_number:
          type: string
          nullable: true
          description: Unique. If worker_code is omitted, backend regenerates worker_code and username from nationality + shirt_type + shirt_number.
          example: "115"
        work_start_date:
          type: string
          format: date
          description: First working date for the worker profile.
          example: 2026-07-03
        work_date:
          type: string
          format: date
          description: Optional legacy field. Shift availability is checked by shift_start_time and shift_end_time only.
          example: 2026-07-03
        shift_start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "08:00"
        shift_end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "17:00"
        profile:
          description: Backward compatible nested profile update.
          $ref: "#/components/schemas/UpdateWorkerProfileInput"
        status:
          type: string
          description: Optional. Updates the worker account status.
          enum:
            - active
            - inactive
          example: active
        work_schedule:
          description: Optional legacy single-shift input. Replaces the current worker schedule rows.
          allOf:
            - $ref: "#/components/schemas/WorkScheduleInput"
        work_schedules:
          type: array
          description: Preferred input for current worker shifts. Replaces current schedule rows with 1-2 schedules. The backend assigns shift_no by array order.
          minItems: 1
          maxItems: 2
          items:
            $ref: "#/components/schemas/WorkScheduleInput"
    ResetPasswordRequest:
      type: object
      required:
        - new_password
      properties:
        new_password:
          type: string
          format: password
          example: NewPassword@123456
    UserListItem:
      type: object
      properties:
        worker_code:
          type: string
          nullable: true
          example: MN000004
        shirt_number:
          type: string
          nullable: true
          example: "4"
        full_name:
          type: string
          example: Worker Name
        work_schedule:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/UserListSchedule"
        work_schedules:
          type: array
          items:
            $ref: "#/components/schemas/UserListSchedule"
        status:
          type: string
          enum:
            - active
            - inactive
          example: active
        updated_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
    UserListSchedule:
      type: object
      properties:
        shift_no:
          type: integer
          enum:
            - 1
            - 2
          example: 1
        work_date:
          type: string
          format: date
          description: Legacy schedule date. Shift availability is checked by shift_start_time and shift_end_time only.
          example: 2026-07-03
        shift_start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "08:00"
        shift_end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "17:00"
        shift_name:
          type: string
          example: Morning shift
    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserListItem"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    SessionInfo:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          example: 5
        device_id:
          type: string
          example: browser-device-id
        device_name:
          type: string
          example: Chrome on Windows
        last_active_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
    UserDetailResponse:
      type: object
      properties:
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mn000115.jpg
        worker_code:
          type: string
          nullable: true
          example: MN000115
        full_name:
          type: string
          example: MANY MANY
        status:
          type: string
          enum:
            - active
            - inactive
          example: active
        details:
          type: object
          properties:
            phone:
              type: string
              nullable: true
              example: "0811111111"
            position:
              type: string
              nullable: true
              example: Worker
            nationality:
              type: string
              nullable: true
              enum:
                - Myanmar
                - Cambodia
              example: Myanmar
            shirt_number:
              type: string
              nullable: true
              example: "115"
            shirt_type:
              type: string
              nullable: true
              enum:
                - Navy
                - Blue
                - Green
              example: Navy
            work_date:
              type: string
              nullable: true
              format: date
              description: Legacy schedule date. Shift availability is checked by shift_start_time and shift_end_time only.
              example: 2026-07-03
            shift_start_time:
              type: string
              nullable: true
              example: "08:00"
            shift_end_time:
              type: string
              nullable: true
              example: "17:00"
            shift_name:
              type: string
              nullable: true
              example: Morning shift
            work_schedules:
              type: array
              items:
                $ref: "#/components/schemas/UserListSchedule"
    WorkScheduleResponse:
      type: object
      properties:
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/WorkSchedule"
    WorkScheduleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WorkSchedule"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    RuntimeSettings:
      type: object
      properties:
        driver_session_ttl_hours:
          type: integer
          example: 24
        worker_accept_deadline_seconds:
          type: integer
          example: 60
        worker_accept_timeout_limit:
          type: integer
          example: 3
        worker_scan_deadline_minutes:
          type: integer
          example: 15
        worker_scan_warning_before_minutes:
          type: integer
          example: 2
        worker_scan_team_remaining_minutes:
          type: integer
          example: 5
        worker_break_duration_minutes:
          type: integer
          example: 15
        worker_break_limit:
          type: integer
          example: 4
        worker_break_count_ttl_hours:
          type: integer
          example: 48
        worker_presence_stale_seconds:
          type: integer
          example: 90
        vendor_confirm_timeout_hours:
          type: integer
          example: 24
        vendor_reconfirm_timeout_hours:
          type: integer
          example: 4
    UpdateRuntimeSettingsRequest:
      type: object
      properties:
        driver_session_ttl_hours:
          type: integer
          minimum: 1
          maximum: 168
          example: 24
        worker_accept_deadline_seconds:
          type: integer
          minimum: 1
          maximum: 600
