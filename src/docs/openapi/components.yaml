    GateTicketRequest:
      type: object
      required:
        - TicketNo
        - TicketCreatedAt
        - BoothCount
        - MarketCode
        - MarketName
        - BoothCode
        - BoothName
        - LicensePlate
        - VehicleTypeCode
        - VehicleTypeName
        - ProductCode
        - ProductName
        - PackageCode
        - PackageName
        - Quantity
        - Dispatch
      properties:
        TicketNo:
          type: string
          example: TKT-20260723-000125
          description: Gate ticket number used as the vehicle-level job reference.
        TicketCreatedAt:
          type: string
          format: date-time
          example: "2026-07-23T14:30:00+07:00"
          description: Date-time when Gate created the ticket.
        BoothCount:
          type: integer
          minimum: 1
          example: 2
          description: Total booth count under this TicketNo.
        MarketCode:
          type: string
          example: "1123"
          description: Market code from Gate.
        MarketName:
          type: string
          example: Orange Market
        BoothCode:
          type: string
          example: B-018
          description: Booth code from Gate.
        BoothName:
          type: string
          example: Orange Booth
        LicensePlate:
          type: string
          example: ABC-1234
        VehicleTypeCode:
          type: string
          example: PICKUP
          description: Vehicle type code from Gate.
        VehicleTypeName:
          type: string
          example: Pickup truck
          description: Vehicle type name from Gate. Stored as the vehicle type display value.
        ProductCode:
          type: string
          example: FRUIT-ORG001
          description: Product code from Gate. Worker uses this value when submitting counted quantities.
        ProductName:
          type: string
          example: Orange
        PackageCode:
          type: string
          example: "22"
        PackageName:
          type: string
          example: Orange package
        Quantity:
          type: number
          example: 180
        Dispatch:
          type: boolean
          example: true
          description: Set true when the vehicle is ready to unload and workers should be dispatched immediately without waiting for Driver ready.
    VehicleJob:
      type: object
      properties:
        ticketNo:
          type: string
          example: TKT-20260723-000125
        gate_transaction_ref:
          type: string
          example: GATE-REQ-001
        license_plate:
          type: string
          example: ABC-1234
        vehicle_type:
          type: string
          nullable: true
