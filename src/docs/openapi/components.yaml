components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      required:
        - statusCode
        - code
        - message
      properties:
        statusCode:
          type: integer
          example: 401
        code:
          type: string
          example: INVALID_TOKEN
        message:
          type: string
          example: Invalid or expired token.
        shift:
          type: object
          nullable: true
          description: Present on OUTSIDE_WORK_SHIFT errors.
          properties:
            name:
              type: string
              example: กะเช้า
            start_time:
              type: string
              example: "06:00"
            end_time:
              type: string
              example: "18:00"
        remaining_time:
          type: string
          nullable: true
          description: Human-readable remaining time until the next shift start. Present on OUTSIDE_WORK_SHIFT errors.
          example: 28 นาที
    Account:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: user01
        role:
          type: string
          enum:
            - admin
            - worker
          example: worker
        status:
          type: string
          enum:
            - active
            - inactive
          example: active
        full_name:
          type: string
          example: Worker Name
        position:
          type: string
          nullable: true
          example: null
        email:
          type: string
          nullable: true
          example: admin@simmummuang.local
        phone:
          type: string
          nullable: true
          example: 081-000-0001
        permission_level:
          type: string
          nullable: true
          enum:
            - owner
            - manager
            - supervisor
          example: null
        created_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
        updated_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
    AdminLoginAccount:
      type: object
      properties:
        full_name:
          type: string
          example: System Admin
        status:
          type: string
          example: active
        position:
          type: string
          nullable: true
          example: Administrator
        email:
          type: string
          nullable: true
          example: admin@simmummuang.local
        phone:
          type: string
          nullable: true
          example: 081-000-0001
        image_url:
          type: string
          nullable: true
          example: null
        permission_level:
          type: string
          nullable: true
          example: manager
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/AdminPermission"
        latest_active_at:
          type: string
          nullable: true
          format: date-time
          example: 2026-07-13T07:54:23.080Z
    WorkerLoginAccount:
      type: object
      properties:
        full_name:
          type: string
          example: Worker Name
        worker_code:
          type: string
          nullable: true
          example: MN000142
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mn000142.jpg
        status:
          type: string
          example: active
        shift:
          $ref: "#/components/schemas/ProfileCardShift"
        server_time:
          type: string
          description: Current server time in HH:mm format.
          example: "09:42"
    ProfileCardShift:
      type: object
      nullable: true
      properties:
        name:
          type: string
          example: day
        start_time:
          type: string
          example: "06:00"
        end_time:
          type: string
          example: "18:00"
    AdminProfileCard:
      type: object
      properties:
        role:
          type: string
          example: admin
        full_name:
          type: string
          example: Admin Sinummuang
        position:
          type: string
          nullable: true
          example: Administrator
        employee_code:
          type: string
          example: ADM0001
        admin_code:
          type: string
          example: ADM0001
        status:
          type: string
          example: active
        email:
          type: string
          nullable: true
          example: admin@simmummuang.local
        phone:
          type: string
          nullable: true
          example: 081-000-0001
        permission_level:
          type: string
          nullable: true
          example: owner
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/AdminPermission"
        latest_active_at:
          type: string
          nullable: true
          format: date-time
          example: 2026-07-13T02:07:55.618Z
    WorkerProfileCard:
      type: object
      properties:
        role:
          type: string
          example: worker
        full_name:
          type: string
          example: Worker Name
        employee_code:
          type: string
          nullable: true
          example: MN000142
        worker_code:
          type: string
          nullable: true
          example: MN000142
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mn000142.jpg
        nationality:
          type: string
          nullable: true
          example: Thai
        nationality_code:
          type: string
          nullable: true
          example: TH
        nationality_name:
          type: string
          nullable: true
          example: Thai
        work_start_date:
          type: string
          nullable: true
          format: date
          example: 2024-07-15
        phone:
          type: string
          nullable: true
          example: 081-234-5678
        shift:
          $ref: "#/components/schemas/ProfileCardShift"
    AuthProfileCard:
      oneOf:
        - $ref: "#/components/schemas/AdminProfileCard"
        - $ref: "#/components/schemas/WorkerProfileCard"
    AdminMeResponse:
      type: object
      properties:
        full_name:
          type: string
          example: System Admin
        position:
          type: string
          nullable: true
          example: Administrator
        admin_code:
          type: string
          example: ADM0001
        status:
          type: string
          example: active
        email:
          type: string
          nullable: true
          example: admin@simmummuang.local
        phone:
          type: string
          nullable: true
          example: 081-000-0001
        permission_level:
          type: string
          nullable: true
          example: manager
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/AdminPermission"
        latest_active_at:
          type: string
          nullable: true
          format: date-time
          example: 2026-07-13T03:18:06.020Z
    WorkerMeResponse:
      type: object
      properties:
        full_name:
          type: string
          example: Worker Name
        worker_code:
          type: string
          nullable: true
          example: MN000142
        nationality:
          type: string
          nullable: true
          example: Thai
        work_start_date:
          type: string
          nullable: true
          format: date
          example: 2024-07-15
        phone:
          type: string
          nullable: true
          example: 081-234-5678
        shift:
          $ref: "#/components/schemas/ProfileCardShift"
    WorkerProfile:
      type: object
      properties:
        id:
          type: integer
          example: 10
        account_id:
          type: integer
          example: 1
        worker_code:
          type: string
          example: MNO00142
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mno00142.jpg
        nationality:
          type: string
          example: Myanmar
        nationality_code:
          type: string
          example: MM
        nationality_name:
          type: string
          example: Myanmar
        work_start_date:
          type: string
          format: date
          example: 2024-07-15
        phone:
          type: string
          example: 081-234-5678
        shirt_type:
          type: string
          nullable: true
          example: Navy
        shirt_number:
          type: string
          nullable: true
          example: "12"
    WorkSchedule:
      type: object
      properties:
        id:
          type: integer
          example: 25
        account_id:
          type: integer
          example: 1
        work_date:
          type: string
          format: date
          example: 2026-07-01
        shift_start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "06:00"
        shift_end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "18:00"
        shift_name:
          type: string
          example: day
        is_current:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
        updated_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
    AuthenticatedAccount:
      oneOf:
        - $ref: "#/components/schemas/AdminMeResponse"
        - $ref: "#/components/schemas/WorkerMeResponse"
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: user01
        password:
          type: string
          format: password
          example: "123456"
        device_id:
          type: string
          description: Required for worker login. Omit for admin login.
          example: browser-device-id
        device_name:
          type: string
          description: Required when the account role is worker. Omit for admin login.
          example: Chrome on Windows
    ConfirmForceLoginRequest:
      type: object
      required:
        - login_challenge_token
        - device_id
        - device_name
      properties:
        login_challenge_token:
          type: string
          example: temporary-jwt-token
        device_id:
          type: string
          example: browser-device-id
        device_name:
          type: string
          example: Chrome on Windows
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: refresh-jwt-token
    AuthSuccessResponse:
      type: object
      properties:
        access_token:
          type: string
          example: access-jwt-token
        refresh_token:
          type: string
          example: refresh-jwt-token
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
        account:
          description: Login returns only token fields and account. Admin account includes profile data, permissions, and latest activity. Worker account includes mobile start-work screen data.
          oneOf:
            - $ref: "#/components/schemas/AdminLoginAccount"
            - $ref: "#/components/schemas/WorkerLoginAccount"
    RefreshSuccessResponse:
      type: object
      properties:
        access_token:
          type: string
          example: access-jwt-token
        refresh_token:
          type: string
          example: refresh-jwt-token
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 900
    LoginConflictResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            code:
              type: string
              example: ACTIVE_SESSION_EXISTS
            login_challenge_token:
              type: string
              example: temporary-jwt-token
            active_device:
              type: object
              properties:
                device_id:
                  type: string
                  example: old-browser-device-id
                device_name:
                  type: string
                  example: Safari on iPhone
                last_active_at:
                  type: string
                  format: date-time
                  example: 2026-07-01T09:00:00.000Z
    LogoutSuccessResponse:
      type: object
      properties:
        message:
          type: string
          example: Logged out successfully.
    ActionMessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Action completed successfully.
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 125
        total_pages:
          type: integer
          example: 7
    WorkerProfileInput:
      type: object
      required:
        - worker_code
        - nationality_code
        - nationality_name
        - work_start_date
        - phone
      properties:
        worker_code:
          type: string
          example: MNO00142
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mno00142.jpg
        nationality:
          type: string
          example: Myanmar
        nationality_code:
          type: string
          example: MM
        nationality_name:
          type: string
          example: Myanmar
        work_start_date:
          type: string
          format: date
          example: 2024-07-15
        phone:
          type: string
          example: 081-234-5678
        shirt_type:
          type: string
          example: Navy
        shirt_number:
          type: string
          example: "12"
    UpdateWorkerProfileInput:
      type: object
      properties:
        worker_code:
          type: string
          example: MNO00142
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mno00142-updated.jpg
        nationality:
          type: string
          example: Myanmar
        nationality_code:
          type: string
          example: MM
        nationality_name:
          type: string
          example: Myanmar
        work_start_date:
          type: string
          format: date
          example: 2024-07-15
        phone:
          type: string
          example: 0899999999
        shirt_type:
          type: string
          example: Navy
        shirt_number:
          type: string
          example: "12"
    WorkScheduleInput:
      type: object
      required:
        - shift_start_time
        - shift_end_time
      properties:
        work_date:
          type: string
          format: date
          description: Optional legacy field. Shift availability is checked by shift_start_time and shift_end_time only.
          example: 2026-07-01
        shift_start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "06:00"
        shift_end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "18:00"
    CreateUserRequest:
      type: object
      required:
        - full_name
        - phone
        - nationality
        - shirt_type
        - shirt_number
        - work_start_date
        - work_schedule
      properties:
        username:
          type: string
          description: Optional. If omitted, backend uses worker_code generated from shirt_number, for example MN000004.
          example: MN000004
        password:
          type: string
          format: password
          description: Optional. If omitted, phone is used as the initial password.
          example: "0812345678"
        img:
          type: string
          description: Optional image URL from the UI. Stored as image_url.
          example: https://example.com/uploads/workers/worker001.jpg
        full_name:
          type: string
          example: Worker One
        phone:
          type: string
          example: "0812345678"
        nationality:
          type: string
          example: Myanmar
        nationality_code:
          type: string
          description: Optional. Defaults to UNKNOWN when omitted.
          example: MM
        nationality_name:
          type: string
          description: Optional. Defaults to nationality when omitted.
          example: Myanmar
        shirt_type:
          type: string
          example: Navy
        shirt_number:
          type: string
          description: Used to generate worker_code and default username with MN prefix and 6 digits.
          example: "4"
        work_start_date:
          type: string
          format: date
          description: First working date for the worker profile.
          example: 2026-07-03
        status:
          type: string
          enum:
            - active
            - inactive
          default: active
          example: active
        work_schedule:
          $ref: "#/components/schemas/WorkScheduleInput"
    CreateUserMultipartRequest:
      type: object
      required:
        - full_name
        - phone
        - nationality
        - shirt_type
        - shirt_number
        - work_start_date
        - shift_start_time
        - shift_end_time
      properties:
        image:
          type: string
          format: binary
          description: "Optional worker profile image. Allowed types: jpg, png, webp. Max size: 5 MB."
        username:
          type: string
          description: Optional. If omitted, backend uses worker_code generated from shirt_number, for example MN000004.
          example: MN000004
        password:
          type: string
          format: password
          description: Optional. If omitted, phone is used as the initial password.
          example: "0812345678"
        full_name:
          type: string
          example: Worker One
        phone:
          type: string
          example: "0812345678"
        nationality:
          type: string
          example: Myanmar
        nationality_code:
          type: string
          description: Optional. Defaults to UNKNOWN when omitted.
          example: MM
        nationality_name:
          type: string
          description: Optional. Defaults to nationality when omitted.
          example: Myanmar
        shirt_type:
          type: string
          example: Navy
        shirt_number:
          type: string
          description: Used to generate worker_code and default username with MN prefix and 6 digits.
          example: "4"
        work_start_date:
          type: string
          format: date
          description: First working date for the worker profile.
          example: 2026-07-03
        status:
          type: string
          enum:
            - active
            - inactive
          default: active
          example: active
        work_date:
          type: string
          format: date
          description: Optional legacy field. Shift availability is checked by shift_start_time and shift_end_time only.
          example: 2026-07-03
        shift_start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "08:00"
        shift_end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "17:00"
        work_schedule:
          type: string
          description: Optional alternative to shift_start_time/shift_end_time. Send a JSON string with those fields. work_date is optional and kept only for backward compatibility.
          example: '{"shift_start_time":"08:00","shift_end_time":"17:00"}'
    UpdateUserRequest:
      type: object
      properties:
        worker_code:
          type: string
          description: Optional. If omitted and shirt_number is sent, backend regenerates worker_code and username from shirt_number.
          example: MN000115
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mn000115.jpg
        img:
          type: string
          nullable: true
          description: Optional alias for image_url.
          example: https://example.com/uploads/workers/mn000115.jpg
        full_name:
          type: string
          example: Worker Name
        phone:
          type: string
          example: "0811111111"
        position:
          type: string
          nullable: true
          example: Worker
        shirt_type:
          type: string
          nullable: true
          example: Navy
        shirt_number:
          type: string
          nullable: true
          example: "115"
        work_start_date:
          type: string
          format: date
          description: First working date for the worker profile.
          example: 2026-07-03
        work_date:
          type: string
          format: date
          description: Optional legacy field. Shift availability is checked by shift_start_time and shift_end_time only.
          example: 2026-07-03
        shift_start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "08:00"
        shift_end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "17:00"
        profile:
          description: Backward compatible nested profile update.
          $ref: "#/components/schemas/UpdateWorkerProfileInput"
        status:
          type: string
          description: Optional. Updates the worker account status.
          enum:
            - active
            - inactive
          example: active
        work_schedule:
          description: Optional. Updates the current worker work schedule in place and removes other schedule rows for that worker.
          allOf:
            - $ref: "#/components/schemas/WorkScheduleInput"
    ResetPasswordRequest:
      type: object
      required:
        - new_password
      properties:
        new_password:
          type: string
          format: password
          example: NewPassword@123456
    UserListItem:
      type: object
      properties:
        worker_code:
          type: string
          nullable: true
          example: MN000004
        shirt_number:
          type: string
          nullable: true
          example: "4"
        full_name:
          type: string
          example: Worker Name
        work_schedule:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/UserListSchedule"
        status:
          type: string
          enum:
            - active
            - inactive
          example: active
        updated_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
    UserListSchedule:
      type: object
      properties:
        work_date:
          type: string
          format: date
          description: Legacy schedule date. Shift availability is checked by shift_start_time and shift_end_time only.
          example: 2026-07-03
        shift_start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "08:00"
        shift_end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
          example: "17:00"
        shift_name:
          type: string
          example: กะเช้า
    UserListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/UserListItem"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    SessionInfo:
      type: object
      nullable: true
      properties:
        id:
          type: integer
          example: 5
        device_id:
          type: string
          example: browser-device-id
        device_name:
          type: string
          example: Chrome on Windows
        last_active_at:
          type: string
          format: date-time
          example: 2026-07-01T09:00:00.000Z
    UserDetailResponse:
      type: object
      properties:
        image_url:
          type: string
          nullable: true
          example: https://example.com/uploads/workers/mn000115.jpg
        worker_code:
          type: string
          nullable: true
          example: MN000115
        full_name:
          type: string
          example: นายMANY MANY
        status:
          type: string
          enum:
            - active
            - inactive
          example: active
        details:
          type: object
          properties:
            phone:
              type: string
              nullable: true
              example: "0811111111"
            position:
              type: string
              nullable: true
              example: Worker
            shirt_number:
              type: string
              nullable: true
              example: "115"
            shirt_type:
              type: string
              nullable: true
              example: Navy
            work_date:
              type: string
              nullable: true
              format: date
              description: Legacy schedule date. Shift availability is checked by shift_start_time and shift_end_time only.
              example: 2026-07-03
            shift_start_time:
              type: string
              nullable: true
              example: "08:00"
            shift_end_time:
              type: string
              nullable: true
              example: "17:00"
            shift_name:
              type: string
              nullable: true
              example: เธเธฐเน€เธเนเธฒ
    WorkScheduleResponse:
      type: object
      properties:
        data:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/WorkSchedule"
    WorkScheduleListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WorkSchedule"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"
    RuntimeSettings:
      type: object
      properties:
        driver_session_ttl_hours:
          type: integer
          example: 24
        worker_accept_deadline_seconds:
          type: integer
          example: 60
        worker_scan_deadline_minutes:
          type: integer
          example: 15
        worker_break_duration_minutes:
          type: integer
          example: 15
        worker_break_limit:
          type: integer
          example: 5
        worker_break_count_ttl_hours:
          type: integer
          example: 48
        worker_presence_stale_seconds:
          type: integer
          example: 90
    UpdateRuntimeSettingsRequest:
      type: object
      properties:
        driver_session_ttl_hours:
          type: integer
          minimum: 1
          maximum: 168
          example: 24
        worker_accept_deadline_seconds:
          type: integer
          minimum: 1
          maximum: 600
          example: 60
        worker_scan_deadline_minutes:
          type: integer
          minimum: 1
          maximum: 240
          example: 15
        worker_break_duration_minutes:
          type: integer
          minimum: 1
          maximum: 240
          example: 15
        worker_break_limit:
          type: integer
          minimum: 0
          maximum: 20
          example: 5
        worker_break_count_ttl_hours:
          type: integer
          minimum: 1
          maximum: 168
          example: 48
        worker_presence_stale_seconds:
          type: integer
          minimum: 1
          maximum: 3600
          example: 90
    AdminPermission:
      type: string
      enum:
        - settings:read
        - settings:update
        - roles:read
        - admins:create
        - permissions:read
        - permissions:update
        - workers:read
