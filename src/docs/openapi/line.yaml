paths:
  /api/line/webhook:
    post:
      tags:
        - LINE
      summary: Receive LINE webhook postback for vendor ticket completion confirm/reject.
      description: Vendor confirm/reject uses the signed `token` generated in the LINE message after a worker completes a stall job. Confirm closes the waiting ticket. When all tickets under the vehicle job are terminal, the backend closes related market jobs, vehicle job, and active worker assignments so workers can go online for the next job.
      operationId: handleLineWebhook
      parameters:
        - in: header
          name: x-line-signature
          schema:
            type: string
          required: false
          description: Required when LINE_CHANNEL_SECRET is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LineWebhookRequest"
      responses:
        "200":
          description: LINE webhook processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LineWebhookResponse"
