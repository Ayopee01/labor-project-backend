paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Log in and create a user session.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Another active session exists on a different device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginConflictResponse"
        "423":
          description: Account is inactive or locked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/login/confirm-force:
    post:
      tags:
        - Auth
      summary: Confirm forced login and replace the old active session.
      operationId: confirmForceLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmForceLoginRequest"
      responses:
        "200":
          description: Force login confirmed and new session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Invalid request body or challenge data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Login challenge is invalid or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: Account is inactive or locked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate a refresh token and issue new tokens.
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refresh successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshSuccessResponse"
        "400":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Refresh token is invalid, expired, or revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke the current authenticated session.
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout successful.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccessResponse"
        "401":
          description: Access token is invalid, expired, or session was revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get the current authenticated account and session context.
      operationId: getCurrentAccount
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current account data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedAccount"
        "401":
          description: Access token is invalid, expired, or session was revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
