paths:
  /api/admin/settings:
    get:
      tags:
        - Admin Settings
      summary: Get runtime system settings.
      operationId: getAdminSettings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Runtime settings used by backend calculations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSettings"
        "403":
          description: Missing settings:read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - Admin Settings
      summary: Update runtime system settings.
      operationId: updateAdminSettings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRuntimeSettingsRequest"
      responses:
        "200":
          description: Updated runtime settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSettings"
        "400":
          description: Invalid settings payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing settings:update permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/roles:
    get:
      tags:
        - Admin Settings
      summary: List admin permission levels with admin accounts grouped by role.
      operationId: listAdminRoles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin permission levels and admin accounts in each level.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminRoleListResponse"
        "403":
          description: Missing roles:read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/gate-clients:
    get:
      tags:
        - Admin Settings
      summary: List Gate client credentials without secrets.
      operationId: listAdminGateClients
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Gate client metadata. Secrets are never returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateClientListResponse"
        "403":
          description: Missing gate_clients:read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      tags:
        - Admin Settings
      summary: Create a Gate client and return its secret once.
      operationId: createAdminGateClient
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGateClientRequest"
      responses:
        "201":
          description: Gate client created. client_secret is shown only in this response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateClientSecretResponse"
        "400":
          description: Invalid Gate client payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing gate_clients:create permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: client_id already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/gate-clients/{clientId}:
    patch:
      tags:
        - Admin Settings
      summary: Update a Gate client name or status.
      operationId: updateAdminGateClient
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
            example: gate-north
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGateClientRequest"
      responses:
        "200":
          description: Gate client updated. Secrets are not returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateClientMutationResponse"
        "400":
          description: Invalid Gate client payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing gate_clients:update permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Gate client not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/gate-clients/{clientId}/secret/rotate:
    post:
      tags:
        - Admin Settings
      summary: Rotate a Gate client secret and revoke the old secret.
      operationId: rotateAdminGateClientSecret
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: clientId
          required: true
          schema:
            type: string
            example: gate-north
      responses:
        "200":
          description: Secret rotated. client_secret is shown only in this response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateClientSecretResponse"
        "403":
          description: Missing gate_clients:rotate_secret permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Gate client not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/admins:
    post:
      tags:
        - Admin Settings
      summary: Create an admin account with initial permissions.
      operationId: createAdminAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminAccountRequest"
      responses:
        "201":
          description: Admin account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAdminAccountResponse"
        "400":
          description: Invalid admin payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing admins:create permission, or new permission level is equal or higher than the actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/users/{id}/permissions:
    get:
      tags:
        - Admin Settings
      summary: Get permissions for one lower-level admin account.
      operationId: getAdminUserPermissions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Admin account id.
      responses:
        "200":
          description: Admin account permissions. The target admin must have a lower permission level than the actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserPermissionsResponse"
        "403":
          description: Missing permissions:read permission, self lookup, or target permission level is equal or higher than the actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Admin account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      tags:
        - Admin Settings
      summary: Update permissions, status, and permission level for one lower-level admin account.
      operationId: updateAdminUserPermissions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Admin account id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminUserPermissionsRequest"
      responses:
        "200":
          description: Admin permissions/status updated. Active sessions for the target admin are revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAdminUserPermissionsResponse"
        "400":
          description: Invalid permissions payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Missing permissions:update permission, or target/new permission level is equal or higher than the actor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Admin account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
