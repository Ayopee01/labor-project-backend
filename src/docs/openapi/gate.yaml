paths:
  /api/gate/vehicle-jobs:
    post:
      tags:
        - Gate
      summary: Mock Gate payload and create a vehicle job.
      operationId: createVehicleJobFromGate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GateVehicleJobRequest"
      responses:
        "201":
          description: Vehicle job created or replayed by idempotency key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateVehicleJobResponse"
        "400":
          description: Invalid Gate payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
