paths:
  /api/gate/vehicle-jobs:
    post:
      tags:
        - Gate
      summary: Create a vehicle job from Gate using Gate Client Credentials.
      description: Use HTTP Basic Auth where username is `client_id` and password is `client_secret`. Gate sends one flat payload per ticket/booth/product using ticketNo, marketCode/marketName, boothCode/boothName, vehicleTypeName, and productCode/productName/packageCode/packageName. Backend derives the idempotency key from ticketNo + marketCode + boothCode + productCode, returns the saved ticket/market/booth/product objects, returns qr.worker_qr_token as the same value as ticketNo for worker check-in, and returns workers_required as 1 for the current Gate flow; worker-count calculation will be added later. Success/replay responses do not include message or gate_transaction_ref. Sending the same ticketNo with a new market/booth/product transaction appends or updates that item under the same vehicle job. Set `dispatch_now` to `true` when the vehicle is already ready to unload.
      operationId: createVehicleJobFromGate
      security:
        - gateBasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GateVehicleJobRequest"
      responses:
        "200":
          description: Existing Gate request replayed by idempotency key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateVehicleJobResponse"
        "201":
          description: Vehicle job created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateVehicleJobResponse"
        "400":
          description: Invalid Gate payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Gate client credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate vehicle job ref or idempotency key payload mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
