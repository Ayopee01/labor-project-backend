paths:
  /api/gate/vehicle-jobs:
    post:
      tags:
        - Gate
      summary: Create a vehicle job from Gate using Gate Client Credentials.
      description: >
        Use HTTP Basic Auth where username is `client_id` and password is
        `client_secret`. Gate sends one flat PascalCase payload per
        ticket/booth/product using TicketNo, TicketCreatedAt, BoothCount,
        MarketCode/MarketName, BoothCode/BoothName, VehicleTypeName, and
        ProductCode/ProductName/PackageCode/PackageName. Backend derives the
        idempotency key from TicketNo + MarketCode + BoothCode + ProductCode,
        returns the saved Ticket/Market/Booth/Product objects, returns
        Qr.WorkerQrToken as the same value as TicketNo for worker check-in, and
        returns Ticket.WorkersRequired as 1 for the current Gate flow;
        worker-count calculation will be added later. Ticket.Status is derived
        from Dispatch only: true returns unload_now and false returns
        waiting_unload. Success/replay responses do not include Message or
        GateTransactionRef. Sending the same TicketNo with a new
        market/booth/product transaction appends or updates that item under the
        same vehicle job. Set `Dispatch` to `true` when the vehicle is already
        ready to unload.
      operationId: createVehicleJobFromGate
      security:
        - gateBasicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GateVehicleJobRequest"
      responses:
        "200":
          description: Existing Gate request replayed by idempotency key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateVehicleJobResponse"
        "201":
          description: Vehicle job created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateVehicleJobResponse"
        "400":
          description: Invalid Gate payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid Gate client credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate vehicle job ref or idempotency key payload mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
