paths:
  /ws/workers:
    get:
      tags:
        - Worker Application
      summary: "[WebSocket] Connect Worker Mobile for realtime assignment dispatch."
      description: |
        WebSocket endpoint for Worker Mobile only.

        Connect with one of these token formats:
        - `ws://localhost:8080/ws/workers?token=<access_token>`
        - `Authorization: Bearer <access_token>` during the upgrade request
        - `Sec-WebSocket-Protocol: token.<access_token>`

        Backend sends realtime events such as `WORKER_ASSIGNED`, `ASSIGNMENT_TIMEOUT`,
        `ASSIGNMENT_CANCELLED`, `ASSIGNMENT_ACCEPTED`, `WORKER_STATUS_CHANGED`,
        `TICKET_COMPLETION_SUBMITTED`, `TICKET_COMPLETION_RESULT`,
        `ASSIGNMENT_SCAN_DEADLINE_EXTENDED`,
        `ASSIGNMENT_SCAN_DEADLINE_SHORTENED`,
        `STALL_JOB_CANCELLED`, `MARKET_JOB_CANCELLED`, and `VEHICLE_JOB_CANCELLED`.
        `WORKER_ASSIGNED` sends `vehicle_job_ref`, `gate_transaction_ref`,
        `worker_qr_token`, and `assignment.created_at/accept_deadline_at`.
        It does not send `driver_qr_token`.
        Worker actions such as accept/check-in/complete still use the REST endpoints.
      operationId: connectWorkerWebSocket
      security:
        - bearerAuth: []
      responses:
        "101":
          description: WebSocket connection upgraded successfully.
        "401":
          description: Missing or invalid access token/session.
        "404":
          description: WebSocket path not found.
  /api/workers/me/online:
    post:
      tags:
        - Worker Application
      summary: Put the current worker into Redis FIFO queue during the assigned shift time.
      description: |
        Worker Mobile must have an active `/ws/workers` WebSocket connection before going online.
        From open_app, a worker can enter the queue only once per configured shift/day.
        If the worker returns early from break, this endpoint can put the worker back into queue before the break timer ends.
        After `/api/workers/me/offline` or a shift-end auto-offline, the worker cannot go online again until the next shift.
      operationId: workerOnline
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Worker online summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerOnlineResponse"
        "403":
          description: Worker is inactive, has no current schedule, or is outside the assigned shift time. OUTSIDE_WORK_SHIFT includes shift and remaining time details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Worker WebSocket is not connected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/workers/me/offline:
    post:
      tags:
        - Worker Application
      summary: Remove the current worker from Redis FIFO queue.
      description: Marks the current shift as closed for this worker. The worker cannot re-enter the queue in the same shift after this call.
      operationId: workerOffline
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Worker leaves dispatch queue summary. Response status is open_app.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerOnlineResponse"
  /api/workers/me/break:
    post:
      tags:
        - Worker Application
      summary: Put the current worker on a configured break during the assigned shift time.
      description: Break duration and daily/shift break limit come from runtime settings. Default is 4 breaks, 15 minutes each.
      operationId: workerBreak
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Worker break summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerBreakResponse"
        "403":
          description: Worker is inactive, has no current schedule, or is outside the assigned shift time. OUTSIDE_WORK_SHIFT includes shift and remaining time details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Worker is not ready, already assigned/working, or reached the break limit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/workers/me/status:
    get:
      tags:
        - Worker Application
      summary: Get current worker profile and shift.
      operationId: getWorkerStatus
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Worker profile and current shift.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerStatusResponse"
  /api/workers/me/assignments/history:
    get:
      tags:
        - Worker Application
      summary: Get the current worker assignment history by date.
      operationId: getWorkerAssignmentHistory
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
            format: date
            example: "2026-07-07"
          description: Assignment created date in YYYY-MM-DD format. The date is interpreted in Asia/Bangkok time.
      responses:
        "200":
          description: Worker assignment history for the selected date.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerAssignmentHistoryResponse"
        "400":
          description: Invalid or missing date query.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/workers/me/assignments/{vehicleJobRef}/accept:
    post:
      tags:
        - Worker Application
      summary: Accept a pending worker assignment within the configured accept deadline.
      description: If the worker misses the accept deadline, the assignment becomes TIMEOUT and the worker is moved to the queue tail. After worker_accept_timeout_limit consecutive accept timeouts, the worker is taken offline for the shift.
      operationId: acceptWorkerAssignment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: vehicleJobRef
          description: vehicle_job_ref from WORKER_ASSIGNED.
          required: true
          schema:
            type: string
            example: VEH-20260706-0003
      responses:
        "200":
          description: Accepted assignment and job detail for the worker job screen.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerAssignmentAcceptResponse"
  /api/workers/me/assignments/{vehicleJobRef}/check-in-qr:
    post:
      tags:
        - Worker Application
      summary: Check in to an accepted assignment with worker QR.
      description: |
        Worker can check in only while scan_deadline_at is valid.
        For multi-worker vehicle jobs, the first successful check-in shortens remaining ACCEPTED workers to the configured worker_scan_team_remaining_minutes window and emits ASSIGNMENT_SCAN_DEADLINE_SHORTENED.
        Backend emits ASSIGNMENT_SCAN_DEADLINE_WARNING to Admin SSE when an ACCEPTED worker has not checked in and remaining scan time is below worker_scan_warning_before_minutes.
        If the scan window expires by API call or background timeout, the assignment becomes TIMEOUT and the worker returns to open_app.
      operationId: checkInWorkerAssignmentQr
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: vehicleJobRef
          description: vehicle_job_ref from WORKER_ASSIGNED.
          required: true
          schema:
            type: string
            example: VEH-20260706-0003
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - qr_token
              properties:
                qr_token:
                  type: string
                  description: worker_qr_token from Gate/Driver ready response or a QR rendered by another checked-in worker.
      responses:
        "200":
          description: Checked-in assignment status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerAssignmentCheckInResponse"
        "409":
          description: Assignment is not accepted or QR scan window expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/workers/me/tickets/{stallJobRef}/complete:
    post:
      tags:
        - Worker Application
      summary: Submit counted product quantities for a GateTicket and wait for vendor confirmation via LINE.
      description: |
        After worker submits quantities, the ticket and assignment status become DELIVERED.
        Workers can submit any stall/market in the same vehicle job once the assigned team has checked in; the API no longer requires waiting for the previous stall to close first.
        If vendor confirms through LINE, the ticket closes. If vendor rejects, the assignment status becomes REJECT and the same endpoint can be used to resubmit.
        If vendor does not respond, the timeout is controlled by vendor_confirm_timeout_hours for the first submission and vendor_reconfirm_timeout_hours after a rejected resubmission.
      operationId: completeWorkerTicket
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: stallJobRef
          required: true
          schema:
            type: string
            example: STALLJOB-001
          description: stall_job_ref from the accepted job payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkerTicketCompleteRequest"
      responses:
        "200":
          description: Ticket completion submitted and waiting for vendor confirmation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketCompletionResponse"
        "403":
          description: Worker is not assigned to this ticket.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Ticket is already waiting for vendor confirmation, closed, or not ready for completion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
