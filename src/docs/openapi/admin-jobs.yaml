paths:
  /api/admin/jobs/workers/{id}/work-schedules:
    get:
      tags:
        - Admin Jobs
      summary: List current worker work schedule for job operations.
      operationId: listAdminJobWorkerWorkSchedules
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Worker code or username, for example MN000115.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of records per page.
      responses:
        "200":
          description: Paginated current worker work schedule.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkScheduleListResponse"
        "401":
          description: Missing or invalid access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated account is not an admin or lacks jobs:read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Worker account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/jobs/workers/status:
    get:
      tags:
        - Admin Jobs
      summary: List online current-shift workers sorted by board status and real queue/status order.
      operationId: listAdminJobWorkerStatuses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Online current-shift worker status list for admin job operations. Data is sorted by status column and status_entered_at, with ready workers ordered by Redis queue_position.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWorkerStatusListResponse"
        "403":
          description: Authenticated account lacks jobs:read permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/jobs/workers/{id}/status/force:
    post:
      tags:
        - Admin Jobs
      summary: Force a worker status when admin must correct status during job operations.
      operationId: forceAdminJobWorkerStatus
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Worker code or username, for example MN000115.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminForceWorkerStatusRequest"
      responses:
        "200":
          description: Worker status forced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminForceWorkerStatusResponse"
        "403":
          description: Worker is inactive, missing a schedule for forced break, or actor lacks workers:force_status permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Worker has an active assignment or break limit reached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/admin/vehicle-jobs/history:
    get:
      tags:
        - Admin Jobs
      summary: List vehicle job history for admin operations.
      operationId: listAdminVehicleJobHistory
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
            example: "2026-07-07"
          description: Optional legacy single-day filter in YYYY-MM-DD format. Equivalent to sending date_from and date_to as the same date.
        - in: query
          name: date_from
          schema:
            type: string
            format: date
            example: "2026-07-01"
          description: Optional created date range start in YYYY-MM-DD format, interpreted in Asia/Bangkok.
        - in: query
          name: date_to
          schema:
            type: string
            format: date
            example: "2026-07-07"
          description: Optional created date range end in YYYY-MM-DD format, inclusive and interpreted in Asia/Bangkok.
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            example: 1
          description: Optional. If sent, the API returns only that page and includes pagination metadata. If omitted, all matching rows are returned.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 20
          description: Optional page size. Used only when page is sent. Defaults to 20.
        - in: query
          name: search
          schema:
            type: string
          description: Search by vehicle job ref, license plate, gate transaction ref, market ref/name, stall job ref, ticket no, or stall no.
        - in: query
          name: status
          schema:
            type: string
            enum:
              - WAIT
              - IN_PROGRESS
              - DELIVERED
              - REJECT
              - COMPLETED
              - CANCELLED
              - PENDING
              - ACCEPTED
              - SCANNED
              - WORKING
              - TIMEOUT
          description: Filter by status at vehicle, market, stall, stall confirmation, or worker assignment level.
      responses:
        "200":
          description: Vehicle job history list with markets, stall jobs, and products.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminVehicleJobListResponse"
  /api/admin/jobs/cancel:
    post:
      tags:
        - Admin Jobs
      summary: Cancel a vehicle, market, or stall job using one endpoint.
      operationId: cancelAdminJob
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminJobCancelRequest"
      responses:
        "200":
          description: Job cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminJobCancelResponse"
  /api/admin/vehicle-jobs/{vehicleJobRef}/assign-workers:
    post:
      tags:
        - Admin Jobs
      summary: Manually assign a vehicle job to selected workers who are ready in queue.
      operationId: assignAdminVehicleJobWorkers
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: vehicleJobRef
          required: true
          schema:
            type: string
            example: VEH-20260706-0001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAssignWorkersRequest"
      responses:
        "201":
          description: Workers assigned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAssignWorkersResponse"
  /api/admin/vehicle-jobs/{vehicleJobRef}/scan-deadline/extend:
    post:
      tags:
        - Admin Jobs
      summary: Extend scan deadline for accepted workers whose scan deadline has not expired.
      operationId: extendAdminVehicleJobScanDeadline
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: vehicleJobRef
          required: true
          schema:
            type: string
            example: VEH-20260706-0001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminExtendScanDeadlineRequest"
      responses:
        "200":
          description: Scan deadline extended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminExtendScanDeadlineResponse"
  /api/admin/vehicle-jobs/{vehicleJobRef}/workers/{workerCode}/assignment/cancel:
    post:
      tags:
        - Admin Jobs
      summary: Cancel one worker assignment without auto-refilling from queue.
      operationId: cancelAdminAssignment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: vehicleJobRef
          required: true
          schema:
            type: string
            example: VEH-20260706-0001
        - in: path
          name: workerCode
          required: true
          schema:
            type: string
            example: MN000115
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCancelRequest"
      responses:
        "200":
          description: Assignment cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCancelAssignmentResponse"
