  /api/v1/health:
    get:
      operationId: HealthController_check
      summary: Check system health (Liveness probe)
      parameters: []
      responses:
        '200':
          description: The Health Check is successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  info:
                    type: object
                    example:
                      database:
                        status: up
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
                    nullable: true
                  error:
                    type: object
                    example: {}
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
                    nullable: true
                  details:
                    type: object
                    example:
                      database:
                        status: up
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
        '503':
          description: The Health Check is not successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  info:
                    type: object
                    example:
                      database:
                        status: up
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
                    nullable: true
                  error:
                    type: object
                    example:
                      redis:
                        status: down
                        message: Could not connect
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
                    nullable: true
                  details:
                    type: object
                    example:
                      database:
                        status: up
                      redis:
                        status: down
                        message: Could not connect
                    additionalProperties:
                      type: object
                      required:
                        - status
                      properties:
                        status:
                          type: string
                      additionalProperties: true
      tags:
        - Health
  /api/v1/dev/reset-db:
    post:
      operationId: DevController_resetDatabase
      summary: 'DEV ONLY: Wipe database and run seed script'
      parameters:
        - name: x-dev-tools-secret
          in: header
          description: Optional dev tools secret. Required when DEV_TOOLS_SECRET is configured.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Database reset successfully
      tags:
        - Dev Tools
  /api/v1/dev/skip-scan-timer:
    post:
      operationId: DevController_skipScanTimer
      summary: 'DEV ONLY: Trigger 15-minute scan timeout immediately'
      parameters:
        - name: x-dev-tools-secret
          in: header
          description: Optional dev tools secret. Required when DEV_TOOLS_SECRET is configured.
          required: false
          schema:
            type: string
      responses:
        '200':
          description: ''
      tags:
        - Dev Tools
  /api/v1/admins:
    get:
      operationId: AdminsController_findAll
      summary: List all admins (Superadmin only)
      parameters:
        - name: page
          required: true
          in: query
          schema:
            type: string
        - name: limit
          required: true
          in: query
          schema:
            type: string
      responses:
        '200':
          description: ''
      tags:
        - Admins
      security:
        - bearer: []
    post:
      operationId: AdminsController_create
      summary: Create a new admin (Superadmin only)
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminDto'
      responses:
        '201':
          description: ''
      tags:
        - Admins
      security:
        - bearer: []
  /api/v1/admins/{id}:
    put:
      operationId: AdminsController_update
      summary: Update admin details (Superadmin only)
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminDto'
      responses:
        '200':
          description: ''
      tags:
        - Admins
      security:
        - bearer: []
    delete:
      operationId: AdminsController_remove
      summary: Deactivate an admin (Superadmin only)
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      responses:
        '200':
          description: ''
      tags:
        - Admins
      security:
        - bearer: []
  /api/v1/admins/{id}/upload-image:
    post:
      operationId: AdminsController_uploadProfileImage
      summary: Upload profile image for admin (Superadmin only)
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: number
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: ''
      tags:
        - Admins
      security:
        - bearer: []
info:
  title: Labor Management System API
  description: Backend API for Si Mum Muang Market Goods Unloading Workers
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    ScanVehicleTicketDto:
      type: object
      properties:
        qrToken:
          type: string
          description: Signed worker QR token from the shared vehicle QR set. Required in production.
    VehicleProductCountDto:
      type: object
      properties:
        ticketProductId:
          type: number
        quantity:
          type: number
      required:
        - ticketProductId
        - quantity
    VehicleSubmitCountDto:
      type: object
      properties:
        countData:
          type: array
          items:
            $ref: '#/components/schemas/VehicleProductCountDto'
      required:
        - countData
    ProductCountDto:
      type: object
      properties:
        productId:
          type: number
        quantity:
          type: number
      required:
        - productId
        - quantity
    SubmitCountDto:
      type: object
      properties:
        countData:
          type: array
          items:
            $ref: '#/components/schemas/ProductCountDto'
      required:
        - countData
    AdminActionReasonDto:
      type: object
      properties:
        reasonCode:
          type: string
          description: Standard reason code for audit/reporting
          example: VENDOR_REQUEST
        reasonText:
          type: string
          description: Optional free-text reason detail
          example: ร้านค้าขอยกเลิกแผงนี้
    VehicleExtendScanTimerDto:
      type: object
      properties:
        reasonCode:
          type: string
          description: Standard reason code for audit/reporting
          example: VENDOR_REQUEST
        reasonText:
          type: string
          description: Optional free-text reason detail
          example: ร้านค้าขอยกเลิกแผงนี้
        minutes:
          type: number
          description: Minutes to add to each active scan timer
          default: 5
      required:
        - minutes
    CustomVehicleAssignDto:
      type: object
      properties:
        reasonCode:
          type: string
          description: Standard reason code for audit/reporting
          example: VENDOR_REQUEST
        reasonText:
          type: string
          description: Optional free-text reason detail
          example: ร้านค้าขอยกเลิกแผงนี้
        workerId:
          type: number
      required:
        - workerId
    ExtendTimerDto:
      type: object
      properties:
        reasonCode:
          type: string
          description: Standard reason code for audit/reporting
          example: VENDOR_REQUEST
        reasonText:
          type: string
          description: Optional free-text reason detail
          example: ร้านค้าขอยกเลิกแผงนี้
        minutes:
          type: number
          description: Minutes to add to the timer
          default: 5
      required:
        - minutes
    CustomAssignDto:
      type: object
      properties:
        reasonCode:
          type: string
          description: Standard reason code for audit/reporting
          example: VENDOR_REQUEST
        reasonText:
          type: string
          description: Optional free-text reason detail
          example: ร้านค้าขอยกเลิกแผงนี้
        jobId:
          type: number
        workerId:
          type: number
      required:
        - jobId
        - workerId
    AdminLoginDto:
      type: object
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: password123
      required:
        - username
        - password
    WorkerLoginDto:
      type: object
      properties:
        workerCode:
          type: string
          example: MN000142
        phone:
          type: string
          example: '0812345678'
        deviceId:
          type: string
          example: device-uuid-1234
        fcmToken:
          type: string
          example: fcm-registration-token
          description: FCM registration token used only for push notifications
      required:
        - workerCode
        - phone
        - deviceId
    CreateWorkerDto:
      type: object
      properties:
        firstName:
          type: string
          example: สมชาย
        lastName:
          type: string
          example: ใจดี
        phone:
          type: string
          example: '0812345678'
        preferredLanguage:
          type: string
          example: th
          enum:
            - th
            - my
            - km
            - en
        country:
          type: string
          example: Myanmar
        shirtColor:
          type: string
          example: Navy
        shirtNumber:
          type: string
          example: '123'
        shiftId:
          type: number
          description: Shift ID this worker belongs to
          example: 1
      required:
        - firstName
        - lastName
        - phone
        - preferredLanguage
        - country
        - shirtColor
        - shirtNumber
        - shiftId
    UpdateWorkerDto:
      type: object
      properties:
        firstName:
          type: string
          example: สมชาย
        lastName:
          type: string
          example: ใจดี
        phone:
          type: string
          example: '0812345678'
        preferredLanguage:
          type: string
          example: th
          enum:
            - th
            - my
            - km
            - en
        country:
          type: string
          example: Myanmar
        shirtColor:
          type: string
          example: Navy
        shirtNumber:
          type: string
          example: '123'
        shiftId:
          type: number
          description: Shift ID this worker belongs to
          example: 1
        isActive:
          type: boolean
          description: Whether the worker is active
          example: true
    ForceStatusDto:
      type: object
      properties:
        status:
          type: string
          enum:
            - offline
            - ready
            - busy
            - break
          example: offline
      required:
        - status
    ExtendWorkerTimeDto:
      type: object
      properties:
        minutes:
          type: number
          example: 30
          minimum: 1
        reason:
          type: string
          example: งานรถเที่ยวสุดท้ายยังไม่เสร็จ
          maxLength: 255
      required:
        - minutes
    GateTicketProductDto:
      type: object
      properties:
        productCode:
          type: string
          example: '02033501'
        productName:
          type: string
          example: บลูเบอร์รี่
        packageType:
          type: string
          example: ตะกร้า 8
        amount:
          type: number
          example: 10
      required:
        - productCode
        - productName
        - packageType
        - amount
    GateArrivalTicketDto:
      type: object
      properties:
        marketJobNo:
          type: string
          example: MKT-20260626-000001
        marketId:
          type: string
          example: MKT-001
        marketName:
          type: string
          example: ตลาดสี่มุมเมือง
        gateTicketNo:
          type: string
          example: TICKET-20260626-000001
        stallId:
          type: string
          example: A-01
        stallName:
          type: string
          example: ร้านเจ๊แดง
        vendorLineId:
          type: string
          example: vendor-1
        products:
          description: สินค้าในตั๋วนี้ โดย 1 ticket เท่ากับ 1 แผง
          type: array
          items:
            $ref: '#/components/schemas/GateTicketProductDto'
      required:
        - marketJobNo
        - marketName
        - gateTicketNo
        - stallId
        - products
    GateArrivalDto:
      type: object
      properties:
        licensePlate:
          type: string
          example: 1กข 1234
        gateTransactionId:
          type: string
          example: GATE-20260619-000001
          description: Unique transaction/reference ID from Gate. Can also be sent as Idempotency-Key header.
        gateVehicleRef:
          type: string
          example: GATE-VEHICLE-000001
        driverLineId:
          type: string
          example: driver-line-1
        status:
          type: string
          enum:
            - WAIT
            - DISPATCH_NOW
          example: WAIT
          description: 'Optional: If omitted, the system will auto-calculate based on stall availability'
        tickets:
          description: Vehicle-level tickets. Each ticket represents exactly one stall/panel.
          type: array
          items:
            $ref: '#/components/schemas/GateArrivalTicketDto'
      required:
        - licensePlate
        - tickets
    DriverConfirmDto:
      type: object
      properties:
        jobId:
          type: number
          example: 1
        latitude:
          type: number
          example: 13.9634
        longitude:
          type: number
          example: 100.6225
      required:
        - jobId
        - latitude
        - longitude
    LineWebhookDto:
      type: object
      properties:
        jobId:
          type: number
          description: The Job ID to confirm or reject
        action:
          type: string
          enum:
            - confirm
            - reject
          description: Vendor action
      required:
        - jobId
        - action
    TicketLineWebhookDto:
      type: object
      properties:
        ticketId:
          type: number
          description: The GateTicket ID to confirm or reject
        action:
          type: string
          enum:
            - confirm
            - reject
          description: Vendor action
        rejectReason:
          type: string
          description: Reason when rejecting count
      required:
        - ticketId
        - action
    DriverVehicleTokenDto:
      type: object
      properties:
        token:
          type: string
          description: Signed Driver Web QR token containing vehicleJobId and exp.
      required:
        - token
    DriverScanDto:
      type: object
      properties:
        jobId:
          type: number
        driverLineId:
          type: string
        qrToken:
          type: string
          description: Signed QR token containing jobId and exp. Required when DRIVER_QR_SECRET is configured.
      required:
        - jobId
        - driverLineId
    CreateAdminDto:
      type: object
      properties:
        username:
          type: string
          example: admin_123
        password:
          type: string
          example: password123
        name:
          type: string
          example: John Doe
        role:
          type: string
          enum:
            - SUPERADMIN
            - STAFF
          default: STAFF
      required:
        - username
        - password
        - role
    UpdateAdminDto:
      type: object
      properties:
        password:
          type: string
          example: newpassword123
        name:
          type: string
          example: John Doe Updated
        role:
          type: string
          enum:
            - SUPERADMIN
            - STAFF
        isActive:
          type: boolean
          example: true
