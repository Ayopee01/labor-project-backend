  /api/v1/gate/arrival:
    post:
      operationId: GateController_handleArrival
      summary: 'Webhook: Receive truck arrival data from Gate system'
      description: Accepts a vehicle-level arrival payload with tickets[]. If status is not provided, it will auto-calculate based on active stall work.
      parameters:
        - name: idempotency-key
          required: true
          in: header
          schema:
            type: string
        - name: x-gate-transaction-id
          required: true
          in: header
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          description: Unique Gate transaction key used to safely retry the same arrival request
          required: false
          schema:
            type: string
        - name: x-gate-api-key
          in: header
          description: API key for the external Gate system
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GateArrivalDto'
      responses:
        '200':
          description: Arrival processed successfully. Returns vehicleJobId, workersRequired, QR tokens, workerCalculation, and printPayload
      tags:
        - Gate Webhooks
  /api/v1/gate/driver-confirm:
