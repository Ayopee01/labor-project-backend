openapi: 3.0.3
info:
  title: Labor Management API
  version: 1.0.0-draft
  description: |
    Draft OpenAPI document for the labor unloading management system.

    This is a design-first API contract for reviewing required backend endpoints before implementation.
    It focuses on the main flow: Gate creates jobs, Driver marks ready, Workers accept/scan/submit counts,
    Vendors confirm/reject counts, and Admin monitors or overrides jobs.

servers:
  - url: http://localhost:3000/api/v1
    description: Local development
  - url: https://api.example.com/api/v1
    description: Production placeholder

tags:
  - name: Auth
    description: Login, logout, session and current user APIs
  - name: Gate
    description: Gate integration for creating vehicle jobs and printing QR tickets
  - name: Driver
    description: Driver web APIs opened from vehicle QR
  - name: Worker Queue
    description: Worker queue status, online/offline and break flow
  - name: Worker Assignment
    description: Worker assignment, accept/reject, QR scan and unloading count submission
  - name: Vendor
    description: Vendor or shop confirmation flow
  - name: Admin Dashboard
    description: Admin read-only dashboard APIs
  - name: Admin Actions
    description: Admin override, cancellation, manual assignment and scan deadline extension

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Login for Admin or Worker accounts.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      responses:
        '200':
          description: Current authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /gate/vehicle-jobs:
    post:
      tags: [Gate]
      summary: Create vehicle job from Gate payload
      description: |
        Gate sends vehicle, market jobs, gate tickets and products in one request.
        This endpoint should be idempotent by transactionRef or idempotency key.
      security: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: Optional idempotency key from Gate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GateCreateVehicleJobRequest'
      responses:
        '201':
          description: Vehicle job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateCreateVehicleJobResponse'
        '200':
          description: Duplicate transaction, existing job returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateCreateVehicleJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /gate/vehicle-jobs/{vehicleJobId}/print-payload:
    get:
      tags: [Gate]
      summary: Get print payload for Gate ticket printing
      security: []
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      responses:
        '200':
          description: Printable payload with QR data and ticket mapping
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrintPayload'
        '404':
          $ref: '#/components/responses/NotFound'

  /gate/transactions/{transactionRef}:
    get:
      tags: [Gate]
      summary: Check Gate transaction result
      security: []
      parameters:
        - name: transactionRef
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction result found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateCreateVehicleJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /driver/qr/resolve:
    post:
      tags: [Driver]
      summary: Resolve driver QR token
      description: Driver opens vehicle job from QR token. The client should not manually enter jobId.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QrResolveRequest'
      responses:
        '200':
          description: QR resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QrResolveResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /driver/jobs/{vehicleJobId}:
    get:
      tags: [Driver]
      summary: Get driver job detail
      security: []
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      responses:
        '200':
          description: Driver job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleJobDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /driver/jobs/{vehicleJobId}/status:
    get:
      tags: [Driver]
      summary: Get driver job status
      security: []
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      responses:
        '200':
          description: Current vehicle job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleJobStatusResponse'

  /driver/jobs/{vehicleJobId}/ready:
    post:
      tags: [Driver]
      summary: Mark vehicle job ready to dispatch
      description: Driver presses ready/unload now. The system updates vehicle, market and ticket statuses and triggers dispatch.
      security: []
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  example: รถถึงจุดลงแล้ว
      responses:
        '200':
          description: Job is ready or was already ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleJobStatusResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /workers/me/status:
    get:
      tags: [Worker Queue]
      summary: Get my worker status
      responses:
        '200':
          description: Current worker queue status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerStatusResponse'

  /workers/me/online:
    post:
      tags: [Worker Queue]
      summary: Go online and enter FIFO queue
      responses:
        '200':
          description: Worker entered queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerStatusResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /workers/me/offline:
    post:
      tags: [Worker Queue]
      summary: Go offline and leave queue
      responses:
        '200':
          description: Worker is offline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerStatusResponse'

  /workers/me/break:
    post:
      tags: [Worker Queue]
      summary: Start break
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                durationMinutes:
                  type: integer
                  example: 15
      responses:
        '200':
          description: Worker is on break
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerStatusResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /workers/me/break/end:
    post:
      tags: [Worker Queue]
      summary: End break and return to queue if eligible
      responses:
        '200':
          description: Break ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkerStatusResponse'

  /workers/me/assignments/current:
    get:
      tags: [Worker Assignment]
      summary: Get my current active assignment
      responses:
        '200':
          description: Current assignment or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignment:
                    nullable: true
                    allOf:
                      - $ref: '#/components/schemas/Assignment'

  /worker/assignments/{assignmentId}:
    get:
      tags: [Worker Assignment]
      summary: Get assignment detail
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      responses:
        '200':
          description: Assignment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /worker/assignments/{assignmentId}/accept:
    post:
      tags: [Worker Assignment]
      summary: Accept assigned job
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      responses:
        '200':
          description: Assignment accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '409':
          $ref: '#/components/responses/Conflict'

  /worker/assignments/{assignmentId}/reject:
    post:
      tags: [Worker Assignment]
      summary: Reject assigned job
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectAssignmentRequest'
      responses:
        '200':
          description: Assignment rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '409':
          $ref: '#/components/responses/Conflict'

  /worker/assignments/{assignmentId}/scan-qr:
    post:
      tags: [Worker Assignment]
      summary: Scan worker QR for assignment
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QrResolveRequest'
      responses:
        '200':
          description: QR scan accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /worker/jobs/{vehicleJobId}:
    get:
      tags: [Worker Assignment]
      summary: Get worker vehicle job detail
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      responses:
        '200':
          description: Vehicle job detail for assigned worker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleJobDetail'
        '403':
          $ref: '#/components/responses/Forbidden'

  /worker/jobs/{vehicleJobId}/tickets:
    get:
      tags: [Worker Assignment]
      summary: Get tickets available for counting
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      responses:
        '200':
          description: Tickets in this vehicle job
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickets:
                    type: array
                    items:
                      $ref: '#/components/schemas/GateTicket'

  /worker/tickets/{ticketId}/counts/submit:
    post:
      tags: [Worker Assignment]
      summary: Submit or resubmit actual product counts for a ticket
      parameters:
        - $ref: '#/components/parameters/TicketId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountSubmitRequest'
      responses:
        '200':
          description: Count submitted and pending vendor confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateTicket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /vendor/qr/resolve:
    post:
      tags: [Vendor]
      summary: Resolve vendor ticket QR token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QrResolveRequest'
      responses:
        '200':
          description: QR resolved to ticket
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticketId:
                    type: string
                  vendorAccessToken:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /vendor/tickets/{ticketId}:
    get:
      tags: [Vendor]
      summary: Get ticket detail for vendor confirmation
      security: []
      parameters:
        - $ref: '#/components/parameters/TicketId'
      responses:
        '200':
          description: Ticket and submitted counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateTicket'
        '404':
          $ref: '#/components/responses/NotFound'

  /vendor/tickets/{ticketId}/confirm:
    post:
      tags: [Vendor]
      summary: Confirm submitted count
      security: []
      parameters:
        - $ref: '#/components/parameters/TicketId'
      responses:
        '200':
          description: Ticket confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateTicket'
        '409':
          $ref: '#/components/responses/Conflict'

  /vendor/tickets/{ticketId}/reject:
    post:
      tags: [Vendor]
      summary: Reject submitted count with reason
      security: []
      parameters:
        - $ref: '#/components/parameters/TicketId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorRejectRequest'
      responses:
        '200':
          description: Ticket rejected and needs revision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateTicket'
        '409':
          $ref: '#/components/responses/Conflict'

  /admin/dashboard/vehicle-jobs:
    get:
      tags: [Admin Dashboard]
      summary: List vehicle jobs for dashboard
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/VehicleJobStatus'
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Vehicle job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/VehicleJob'

  /admin/dashboard/workers:
    get:
      tags: [Admin Dashboard]
      summary: List workers and queue states
      parameters:
        - name: queueStatus
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/WorkerQueueStatus'
      responses:
        '200':
          description: Worker list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Worker'

  /admin/vehicle-jobs/{vehicleJobId}:
    get:
      tags: [Admin Dashboard]
      summary: Get full vehicle job detail
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      responses:
        '200':
          description: Full vehicle job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleJobDetail'

  /admin/vehicle-jobs/{vehicleJobId}/market-jobs:
    get:
      tags: [Admin Dashboard]
      summary: List market jobs under vehicle job
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      responses:
        '200':
          description: Market jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MarketJob'

  /admin/vehicle-jobs/{vehicleJobId}/tickets:
    get:
      tags: [Admin Dashboard]
      summary: List tickets under vehicle job
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      responses:
        '200':
          description: Tickets
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/GateTicket'

  /admin/vehicle-jobs/{vehicleJobId}/assignments:
    get:
      tags: [Admin Dashboard]
      summary: List worker assignments under vehicle job
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      responses:
        '200':
          description: Assignments
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Assignment'

  /admin/workers/{workerId}:
    get:
      tags: [Admin Dashboard]
      summary: Get worker detail
      parameters:
        - $ref: '#/components/parameters/WorkerId'
      responses:
        '200':
          description: Worker detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Worker'

  /admin/vehicle-jobs/{vehicleJobId}/cancel:
    post:
      tags: [Admin Actions]
      summary: Cancel whole vehicle job
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminActionReason'
      responses:
        '200':
          description: Vehicle job cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleJobStatusResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /admin/market-jobs/{marketJobId}/cancel:
    post:
      tags: [Admin Actions]
      summary: Cancel market job
      parameters:
        - $ref: '#/components/parameters/MarketJobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminActionReason'
      responses:
        '200':
          description: Market job cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketJob'

  /admin/tickets/{ticketId}/cancel:
    post:
      tags: [Admin Actions]
      summary: Cancel ticket or shop panel
      parameters:
        - $ref: '#/components/parameters/TicketId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminActionReason'
      responses:
        '200':
          description: Ticket cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateTicket'

  /admin/assignments/{assignmentId}/cancel:
    post:
      tags: [Admin Actions]
      summary: Cancel worker assignment
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminActionReason'
      responses:
        '200':
          description: Assignment cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'

  /admin/vehicle-jobs/{vehicleJobId}/back-to-wait:
    post:
      tags: [Admin Actions]
      summary: Move vehicle job back to WAIT
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminActionReason'
      responses:
        '200':
          description: Vehicle job moved back to WAIT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleJobStatusResponse'

  /admin/vehicle-jobs/{vehicleJobId}/manual-assign:
    post:
      tags: [Admin Actions]
      summary: Manually assign worker to vehicle job
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualAssignRequest'
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '409':
          $ref: '#/components/responses/Conflict'

  /admin/assignments/{assignmentId}/extend-scan-deadline:
    post:
      tags: [Admin Actions]
      summary: Extend worker QR scan deadline
      parameters:
        - $ref: '#/components/parameters/AssignmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtendScanDeadlineRequest'
      responses:
        '200':
          description: Scan deadline extended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'

  /admin/vehicle-jobs/{vehicleJobId}/dispatch:
    post:
      tags: [Admin Actions]
      summary: Trigger dispatch manually
      description: Optional admin endpoint for manually triggering dispatch for a DISPATCH_NOW job.
      parameters:
        - $ref: '#/components/parameters/VehicleJobId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminActionReason'
      responses:
        '200':
          description: Dispatch triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleJobStatusResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    VehicleJobId:
      name: vehicleJobId
      in: path
      required: true
      schema:
        type: string
      example: vj_20260702_0001
    MarketJobId:
      name: marketJobId
      in: path
      required: true
      schema:
        type: string
      example: mj_20260702_0001
    TicketId:
      name: ticketId
      in: path
      required: true
      schema:
        type: string
      example: tk_20260702_0001
    AssignmentId:
      name: assignmentId
      in: path
      required: true
      schema:
        type: string
      example: asg_20260702_0001
    WorkerId:
      name: workerId
      in: path
      required: true
      schema:
        type: string
      example: worker_001

  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Current state does not allow this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: INVALID_STATE
            message:
              type: string
              example: Current state does not allow this action
            details:
              type: object
              nullable: true

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: worker001
        password:
          type: string
          format: password
          example: password123
        deviceId:
          type: string
          example: ios-device-uuid
        pushToken:
          type: string
          example: fcm-token

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
          example: user_001
        username:
          type: string
          example: worker001
        role:
          type: string
          enum: [ADMIN, WORKER]
          example: WORKER
        fullName:
          type: string
          example: สมชาย ใจดี
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
          example: ACTIVE

    Worker:
      type: object
      properties:
        id:
          type: string
          example: worker_001
        code:
          type: string
          example: W001
        fullName:
          type: string
          example: สมชาย ใจดี
        shirtColor:
          type: string
          example: blue
        shirtNumber:
          type: string
          example: '12'
        queueStatus:
          $ref: '#/components/schemas/WorkerQueueStatus'
        currentAssignmentId:
          type: string
          nullable: true
          example: asg_20260702_0001

    WorkerQueueStatus:
      type: string
      enum: [offline, ready, busy, break]
      example: ready

    WorkerStatusResponse:
      type: object
      properties:
        workerId:
          type: string
          example: worker_001
        queueStatus:
          $ref: '#/components/schemas/WorkerQueueStatus'
        queuePosition:
          type: integer
          nullable: true
          example: 3
        currentAssignmentId:
          type: string
          nullable: true
          example: asg_20260702_0001

    VehicleJobStatus:
      type: string
      enum: [WAIT, DISPATCH_NOW, IN_PROGRESS, COMPLETED, CANCELLED]
      example: WAIT

    TicketStatus:
      type: string
      enum: [WAIT, READY, IN_PROGRESS, SUBMITTED, NEEDS_REVISION, COMPLETED, CANCELLED]
      example: WAIT

    VendorStatus:
      type: string
      enum: [NOT_SUBMITTED, PENDING, CONFIRMED, REJECTED, CANCELLED]
      example: NOT_SUBMITTED

    AssignmentStatus:
      type: string
      enum: [PENDING, ACCEPTED, REJECTED, TIMEOUT, SCANNED, COUNTING, COMPLETED, CANCELLED]
      example: PENDING

    GateCreateVehicleJobRequest:
      type: object
      required: [transactionRef, vehicle, tickets]
      properties:
        transactionRef:
          type: string
          example: gate-txn-20260702-000001
        initialStatus:
          $ref: '#/components/schemas/VehicleJobStatus'
        vehicle:
          type: object
          required: [licensePlate]
          properties:
            licensePlate:
              type: string
              example: 70-1234 กรุงเทพมหานคร
            driverName:
              type: string
              example: นายขับ รถดี
            driverPhone:
              type: string
              example: '0812345678'
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/GateTicketInput'

    GateTicketInput:
      type: object
      required: [gateTicketNo, marketJobNo, marketName, stallCode, products]
      properties:
        gateTicketNo:
          type: string
          example: GT-000001
        marketJobNo:
          type: string
          description: Market job number, expected 14 digits from Gate.
          example: '20260702000001'
        marketName:
          type: string
          example: ตลาด A
        stallCode:
          type: string
          example: A-01
        vendor:
          type: object
          properties:
            name:
              type: string
              example: ร้านแม่แดง
            lineId:
              type: string
              example: '@vendorline'
            phone:
              type: string
              example: '0899999999'
        products:
          type: array
          items:
            $ref: '#/components/schemas/TicketProductInput'

    TicketProductInput:
      type: object
      required: [productCode, productName, expectedQuantity]
      properties:
        productCode:
          type: string
          example: P001
        productName:
          type: string
          example: แตงโม
        expectedQuantity:
          type: integer
          example: 80
        unit:
          type: string
          example: ลูก

    GateCreateVehicleJobResponse:
      type: object
      properties:
        vehicleJobId:
          type: string
          example: vj_20260702_0001
        transactionRef:
          type: string
          example: gate-txn-20260702-000001
        workersRequired:
          type: integer
          example: 2
        vehicleStatus:
          $ref: '#/components/schemas/VehicleJobStatus'
        driverQr:
          $ref: '#/components/schemas/QrPayload'
        workerQr:
          $ref: '#/components/schemas/QrPayload'
        printPayload:
          $ref: '#/components/schemas/PrintPayload'

    QrPayload:
      type: object
      properties:
        token:
          type: string
          example: qr-token-value
        expiresAt:
          type: string
          format: date-time
          example: '2026-07-02T17:00:00+07:00'
        url:
          type: string
          example: https://app.example.com/driver?token=qr-token-value

    PrintPayload:
      type: object
      properties:
        vehicleJobId:
          type: string
          example: vj_20260702_0001
        licensePlate:
          type: string
          example: 70-1234 กรุงเทพมหานคร
        workersRequired:
          type: integer
          example: 2
        driverQr:
          $ref: '#/components/schemas/QrPayload'
        workerQr:
          $ref: '#/components/schemas/QrPayload'
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/GateTicket'

    QrResolveRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          example: qr-token-value

    QrResolveResponse:
      type: object
      properties:
        vehicleJobId:
          type: string
          example: vj_20260702_0001
        ticketId:
          type: string
          nullable: true
          example: tk_20260702_0001
        tokenType:
          type: string
          enum: [DRIVER, WORKER, VENDOR]
          example: DRIVER
        expiresAt:
          type: string
          format: date-time

    VehicleJob:
      type: object
      properties:
        id:
          type: string
          example: vj_20260702_0001
        transactionRef:
          type: string
          example: gate-txn-20260702-000001
        licensePlate:
          type: string
          example: 70-1234 กรุงเทพมหานคร
        workersRequired:
          type: integer
          example: 2
        status:
          $ref: '#/components/schemas/VehicleJobStatus'
        createdAt:
          type: string
          format: date-time

    VehicleJobDetail:
      allOf:
        - $ref: '#/components/schemas/VehicleJob'
        - type: object
          properties:
            markets:
              type: array
              items:
                $ref: '#/components/schemas/MarketJob'
            tickets:
              type: array
              items:
                $ref: '#/components/schemas/GateTicket'
            assignments:
              type: array
              items:
                $ref: '#/components/schemas/Assignment'

    VehicleJobStatusResponse:
      type: object
      properties:
        vehicleJobId:
          type: string
          example: vj_20260702_0001
        status:
          $ref: '#/components/schemas/VehicleJobStatus'
        workersRequired:
          type: integer
          example: 2
        activeAssignments:
          type: integer
          example: 1
        message:
          type: string
          example: Job is waiting for more workers

    MarketJob:
      type: object
      properties:
        id:
          type: string
          example: mj_20260702_0001
        vehicleJobId:
          type: string
          example: vj_20260702_0001
        marketJobNo:
          type: string
          example: '20260702000001'
        marketName:
          type: string
          example: ตลาด A
        status:
          $ref: '#/components/schemas/VehicleJobStatus'

    GateTicket:
      type: object
      properties:
        id:
          type: string
          example: tk_20260702_0001
        vehicleJobId:
          type: string
          example: vj_20260702_0001
        marketJobId:
          type: string
          example: mj_20260702_0001
        gateTicketNo:
          type: string
          example: GT-000001
        stallCode:
          type: string
          example: A-01
        vendorName:
          type: string
          example: ร้านแม่แดง
        status:
          $ref: '#/components/schemas/TicketStatus'
        vendorStatus:
          $ref: '#/components/schemas/VendorStatus'
        products:
          type: array
          items:
            $ref: '#/components/schemas/TicketProduct'

    TicketProduct:
      type: object
      properties:
        id:
          type: string
          example: tp_001
        productCode:
          type: string
          example: P001
        productName:
          type: string
          example: แตงโม
        expectedQuantity:
          type: integer
          example: 80
        actualQuantity:
          type: integer
          nullable: true
          example: 78
        unit:
          type: string
          example: ลูก

    Assignment:
      type: object
      properties:
        id:
          type: string
          example: asg_20260702_0001
        vehicleJobId:
          type: string
          example: vj_20260702_0001
        workerId:
          type: string
          example: worker_001
        status:
          $ref: '#/components/schemas/AssignmentStatus'
        acceptDeadlineAt:
          type: string
          format: date-time
          nullable: true
        scanDeadlineAt:
          type: string
          format: date-time
          nullable: true
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        scannedAt:
          type: string
          format: date-time
          nullable: true

    AssignmentDetail:
      allOf:
        - $ref: '#/components/schemas/Assignment'
        - type: object
          properties:
            vehicleJob:
              $ref: '#/components/schemas/VehicleJob'
            worker:
              $ref: '#/components/schemas/Worker'

    RejectAssignmentRequest:
      type: object
      properties:
        reason:
          type: string
          example: ไม่พร้อมรับงาน

    CountSubmitRequest:
      type: object
      required: [assignmentId, products]
      properties:
        assignmentId:
          type: string
          example: asg_20260702_0001
        note:
          type: string
          example: นับครบแล้ว
        products:
          type: array
          items:
            type: object
            required: [ticketProductId, actualQuantity]
            properties:
              ticketProductId:
                type: string
                example: tp_001
              actualQuantity:
                type: integer
                example: 78

    VendorRejectRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          example: จำนวนสินค้าไม่ตรง
        details:
          type: string
          example: แตงโมขาด 2 ลูก

    AdminActionReason:
      type: object
      required: [reasonCode, reasonText]
      properties:
        reasonCode:
          type: string
          example: OPERATION_ISSUE
        reasonText:
          type: string
          example: หน้างานแจ้งว่ายกเลิกการลงสินค้า

    ManualAssignRequest:
      allOf:
        - $ref: '#/components/schemas/AdminActionReason'
        - type: object
          required: [workerId]
          properties:
            workerId:
              type: string
              example: worker_001

    ExtendScanDeadlineRequest:
      allOf:
        - $ref: '#/components/schemas/AdminActionReason'
        - type: object
          required: [extendMinutes]
          properties:
            extendMinutes:
              type: integer
              example: 10
