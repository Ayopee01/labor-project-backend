services:
  postgres:
    image: postgres:16-alpine
    container_name: labor-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labor_password}
      POSTGRES_DB: ${POSTGRES_DB:-labor_project}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
