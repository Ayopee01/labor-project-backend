services:
  redis:
    image: redis:7-alpine
    container_name: labor-redis
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      target: dev
    container_name: labor-api
    env_file:
      - .env
    environment:
      PORT: 8080
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:password@host.docker.internal:5433/labor_project}
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ./uploads:/app/uploads
      - api_node_modules:/app/node_modules
    command: sh -c "npm run db:generate && npm run dev"
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
  api_node_modules:
